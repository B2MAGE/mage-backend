services:
  minio:
    image: minio/minio:latest
    container_name: mage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MAGE_THUMBNAIL_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MAGE_THUMBNAIL_MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: mage-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing local/"$$MAGE_THUMBNAIL_BUCKET" &&
        mc anonymous set download local/"$$MAGE_THUMBNAIL_BUCKET"
    environment:
      MINIO_ROOT_USER: ${MAGE_THUMBNAIL_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MAGE_THUMBNAIL_MINIO_ROOT_PASSWORD:-minioadmin}
      MAGE_THUMBNAIL_BUCKET: ${MAGE_THUMBNAIL_MINIO_BUCKET:-mage-local-thumbnails}

  backend:
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MAGE_THUMBNAIL_PROVIDER: minio
      MAGE_THUMBNAIL_REGION: ${MAGE_THUMBNAIL_MINIO_REGION:-us-east-1}
      MAGE_THUMBNAIL_BUCKET: ${MAGE_THUMBNAIL_MINIO_BUCKET:-mage-local-thumbnails}
      MAGE_THUMBNAIL_ENDPOINT: ${MAGE_THUMBNAIL_MINIO_ENDPOINT:-http://minio:9000}
      MAGE_THUMBNAIL_PRESIGN_ENDPOINT: ${MAGE_THUMBNAIL_MINIO_PRESIGN_ENDPOINT:-http://localhost:9000}
      MAGE_THUMBNAIL_ACCESS_KEY_ID: ${MAGE_THUMBNAIL_MINIO_ACCESS_KEY_ID:-minioadmin}
      MAGE_THUMBNAIL_SECRET_ACCESS_KEY: ${MAGE_THUMBNAIL_MINIO_SECRET_ACCESS_KEY:-minioadmin}
      MAGE_THUMBNAIL_PATH_STYLE_ACCESS: true
      MAGE_THUMBNAIL_PUBLIC_BASE_URL: ${MAGE_THUMBNAIL_MINIO_PUBLIC_BASE_URL:-http://localhost:9000/mage-local-thumbnails}

volumes:
  minio_data:
