services:
  postgres:
    image: postgres:16
    container_name: mage-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build: .
    container_name: mage-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME:-mage-backend}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      MAGE_AUTH_GOOGLE_CLIENT_IDS: ${MAGE_AUTH_GOOGLE_CLIENT_IDS}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      MAGE_THUMBNAIL_PROVIDER: ${MAGE_THUMBNAIL_PROVIDER:-aws-s3}
      MAGE_THUMBNAIL_REGION: ${MAGE_THUMBNAIL_REGION:-}
      MAGE_THUMBNAIL_BUCKET: ${MAGE_THUMBNAIL_BUCKET}
      MAGE_THUMBNAIL_KEY_PREFIX: ${MAGE_THUMBNAIL_KEY_PREFIX:-scenes}
      MAGE_THUMBNAIL_ENDPOINT: ${MAGE_THUMBNAIL_ENDPOINT:-}
      MAGE_THUMBNAIL_PRESIGN_ENDPOINT: ${MAGE_THUMBNAIL_PRESIGN_ENDPOINT:-}
      MAGE_THUMBNAIL_ACCESS_KEY_ID: ${MAGE_THUMBNAIL_ACCESS_KEY_ID:-}
      MAGE_THUMBNAIL_SECRET_ACCESS_KEY: ${MAGE_THUMBNAIL_SECRET_ACCESS_KEY:-}
      MAGE_THUMBNAIL_PATH_STYLE_ACCESS: ${MAGE_THUMBNAIL_PATH_STYLE_ACCESS:-}
      MAGE_THUMBNAIL_PUBLIC_BASE_URL: ${MAGE_THUMBNAIL_PUBLIC_BASE_URL}
      MAGE_THUMBNAIL_ALLOWED_CONTENT_TYPES: ${MAGE_THUMBNAIL_ALLOWED_CONTENT_TYPES:-image/jpeg,image/png,image/webp,image/gif}
      MAGE_THUMBNAIL_MAX_BYTES: ${MAGE_THUMBNAIL_MAX_BYTES:-5242880}
      MAGE_THUMBNAIL_PRESIGN_DURATION: ${MAGE_THUMBNAIL_PRESIGN_DURATION:-PT10M}

volumes:
  postgres_data:
