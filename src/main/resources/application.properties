spring.application.name=${SPRING_APPLICATION_NAME:mage-backend}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

mage.auth.google.client-ids=${MAGE_AUTH_GOOGLE_CLIENT_IDS}

spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

mage.thumbnail.storage-path=${MAGE_THUMBNAIL_STORAGE_PATH:${java.io.tmpdir}/mage-thumbnails}
