spring.application.name=${SPRING_APPLICATION_NAME:mage-backend}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

mage.auth.google.client-ids=${MAGE_AUTH_GOOGLE_CLIENT_IDS}

spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

mage.thumbnail.provider=${MAGE_THUMBNAIL_PROVIDER:aws-s3}
mage.thumbnail.region=${MAGE_THUMBNAIL_REGION:${AWS_REGION:}}
mage.thumbnail.bucket=${MAGE_THUMBNAIL_BUCKET}
mage.thumbnail.key-prefix=${MAGE_THUMBNAIL_KEY_PREFIX:presets}
mage.thumbnail.endpoint=${MAGE_THUMBNAIL_ENDPOINT:}
mage.thumbnail.presign-endpoint=${MAGE_THUMBNAIL_PRESIGN_ENDPOINT:}
mage.thumbnail.access-key-id=${MAGE_THUMBNAIL_ACCESS_KEY_ID:}
mage.thumbnail.secret-access-key=${MAGE_THUMBNAIL_SECRET_ACCESS_KEY:}
mage.thumbnail.path-style-access=${MAGE_THUMBNAIL_PATH_STYLE_ACCESS:}
mage.thumbnail.public-base-url=${MAGE_THUMBNAIL_PUBLIC_BASE_URL}
mage.thumbnail.allowed-content-types=${MAGE_THUMBNAIL_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif}
mage.thumbnail.max-bytes=${MAGE_THUMBNAIL_MAX_BYTES:5242880}
mage.thumbnail.presign-duration=${MAGE_THUMBNAIL_PRESIGN_DURATION:PT10M}
