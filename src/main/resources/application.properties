spring.application.name=${SPRING_APPLICATION_NAME:mage-backend}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

mage.auth.google.client-ids=${MAGE_AUTH_GOOGLE_CLIENT_IDS}

spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

mage.thumbnail.provider=${MAGE_THUMBNAIL_PROVIDER:aws-s3}
mage.thumbnail.region=${MAGE_THUMBNAIL_REGION:${AWS_REGION:}}
mage.thumbnail.bucket=${MAGE_THUMBNAIL_BUCKET}
mage.thumbnail.key-prefix=${MAGE_THUMBNAIL_KEY_PREFIX:scenes}
mage.thumbnail.endpoint=${MAGE_THUMBNAIL_ENDPOINT:}
mage.thumbnail.presign-endpoint=${MAGE_THUMBNAIL_PRESIGN_ENDPOINT:}
mage.thumbnail.access-key-id=${MAGE_THUMBNAIL_ACCESS_KEY_ID:}
mage.thumbnail.secret-access-key=${MAGE_THUMBNAIL_SECRET_ACCESS_KEY:}
mage.thumbnail.path-style-access=${MAGE_THUMBNAIL_PATH_STYLE_ACCESS:}
mage.thumbnail.public-base-url=${MAGE_THUMBNAIL_PUBLIC_BASE_URL}
mage.thumbnail.allowed-content-types=${MAGE_THUMBNAIL_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif}
mage.thumbnail.max-bytes=${MAGE_THUMBNAIL_MAX_BYTES:5242880}
mage.thumbnail.presign-duration=${MAGE_THUMBNAIL_PRESIGN_DURATION:PT10M}

mage.password-reset.delivery=${MAGE_PASSWORD_RESET_DELIVERY:log}
mage.password-reset.frontend-base-url=${MAGE_PASSWORD_RESET_FRONTEND_BASE_URL:http://localhost:5173}
mage.password-reset.token-ttl=${MAGE_PASSWORD_RESET_TOKEN_TTL:PT30M}
mage.password-reset.from-email=${MAGE_PASSWORD_RESET_FROM_EMAIL:}
mage.password-reset.from-name=${MAGE_PASSWORD_RESET_FROM_NAME:MAGE}

spring.mail.host=${MAGE_EMAIL_SMTP_HOST:}
spring.mail.port=${MAGE_EMAIL_SMTP_PORT:587}
spring.mail.username=${MAGE_EMAIL_SMTP_USERNAME:}
spring.mail.password=${MAGE_EMAIL_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAGE_EMAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAGE_EMAIL_SMTP_STARTTLS_ENABLE:true}
